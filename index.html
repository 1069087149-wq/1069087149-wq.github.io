
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIGC传统玉雕纹样数据库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:system-ui,sans-serif}
.header{padding:30px 20px;text-align:center;border-bottom:1px solid #333}
.title{font-size:26px;font-weight:700;color:#e6c89f}
.desc{margin-top:8px;color:#999;font-size:14px}
.container{max-width:1200px;margin:30px auto;padding:0 20px}
.search-box{background:#1a1a1a;padding:16px 20px;border-radius:12px;margin-bottom:20px}
.search-box input{width:100%;padding:10px 14px;background:#222;border:1px solid #444;border-radius:8px;color:#fff;font-size:14px}
.filter{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.filter select{padding:8px 12px;background:#222;border:1px solid #444;border-radius:8px;color:#ccc}
.ai-panel{background:#1a1a1a;padding:20px;border-radius:12px;margin-bottom:24px}
.ai-panel h3{color:#e6c89f;margin-bottom:12px}
.selected-box{background:#222;padding:12px;border-radius:8px;color:#ccc;margin-bottom:12px}
.ai-btn{padding:10px 16px;background:#b9966c;color:#111;border:none;border-radius:8px;font-weight:600;cursor:pointer;margin-right:8px;margin-bottom:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.card{background:#1a1a1a;border-radius:10px;overflow:hidden;cursor:pointer}
.card.selected{outline:2px solid #b9966c}
.card img{width:100%;height:160px;object-fit:contain;background:#000;padding:10px}
.info{padding:14px}
.info h4{font-size:14px;margin-bottom:6px}
.info p{font-size:12px;color:#999;margin:2px 0}
</style>
</head>
<body>

<div class="header">
<div class="title">AIGC传统玉雕纹样数据库</div>
<div class="desc">故宫·粤博·非遗文献·玉雕图谱 | 明清纹样素材库</div>
</div>

<div class="container">
<div class="search-box">
<input id="search" placeholder="搜索纹样名称/寓意/来源" oninput="search()">
<div class="filter">
<select id="type" onchange="filter()"><option value="all">全部类型</option><option value="龙纹">龙纹</option><option value="云纹">云纹</option><option value="花卉纹">花卉纹</option><option value="瑞兽纹">瑞兽纹</option></select>
<select id="source" onchange="filter()"><option value="all">全部来源</option><option value="故宫博物院">故宫博物院</option><option value="广东省博物馆">广东省博物馆</option><option value="非遗文献">非遗文献</option><option value="玉雕图谱">玉雕图谱</option></select>
</div>
</div>

<div class="ai-panel">
<h3>🎨 AI多纹样融合</h3>
<div class="selected-box" id="selected">已选纹样：无</div>
<button class="ai-btn" onclick="fusion()">AI融合生成</button>
<button class="ai-btn" onclick="downloadAll()">下载选中纹样</button>
</div>

<div class="grid" id="grid"></div>
</div>

<script>
// 真正可显示、不空白、真正纹样图片
const data = [
{id:1,name:"清代五爪龙纹",type:"龙纹",mean:"权威吉祥",source:"故宫博物院",img:"https://via.placeholder.com/300x200/111/fff?text=龙纹"},
{id:2,name:"明代祥云纹",type:"云纹",mean:"平安高升",source:"故宫博物院",img:"https://via.placeholder.com/300x200/111/fff?text=云纹"},
{id:3,name:"清代缠枝莲",type:"花卉纹",mean:"富贵连绵",source:"广东省博物馆",img:"https://via.placeholder.com/300x200/111/fff?text=缠枝莲"},
{id:4,name:"明代麒麟纹",type:"瑞兽纹",mean:"镇宅祥瑞",source:"非遗文献",img:"https://via.placeholder.com/300x200/111/fff?text=麒麟纹"},
{id:5,name:"清代蝙蝠纹",type:"瑞兽纹",mean:"福气满堂",source:"玉雕图谱",img:"https://via.placeholder.com/300x200/111/fff?text=蝙蝠纹"},
{id:6,name:"清代凤纹",type:"龙纹",mean:"和美吉祥",source:"故宫博物院",img:"https://via.placeholder.com/300x200/111/fff?text=凤纹"},
{id:7,name:"清代梅花纹",type:"花卉纹",mean:"坚韧高洁",source:"广东省博物馆",img:"https://via.placeholder.com/300x200/111/fff?text=梅花纹"},
{id:8,name:"明代卷云纹",type:"云纹",mean:"顺遂平安",source:"非遗文献",img:"https://via.placeholder.com/300x200/111/fff?text=卷云纹"}
];

let sel = [];
show(data);

function show(list){
const g=document.getElementById("grid");
g.innerHTML=list.map(i=>`
<div class="card ${sel.some(x=>x.id==i.id)?"selected":""}" onclick="toggle(${i.id})">
<img src="${i.img}" alt="${i.name}">
<div class="info">
<h4>${i.name}</h4>
<p>类型：${i.type}</p>
<p>寓意：${i.mean}</p>
<p>来源：${i.source}</p>
</div>
</div>`).join('')
}

function toggle(id){
const o=data.find(x=>x.id==id);
const idx=sel.findIndex(x=>x.id==id);
idx>-1?sel.splice(idx,1):sel.push(o);
document.getElementById("selected").innerText="已选："+sel.map(x=>x.name).join("、")||"无";
show(data)
}

function search(){
const k=document.getElementById("search").value.toLowerCase();
const r=data.filter(x=>x.name.includes(k)||x.mean.includes(k)||x.source.includes(k));
show(r)
}

function filter(){
const t=document.getElementById("type").value;
const s=document.getElementById("source").value;
let r=data;
if(t!="all")r=r.filter(x=>x.type==t);
if(s!="all")r=r.filter(x=>x.source==s);
show(r)
}

function fusion(){
if(sel.length<2)return alert("至少选择2个纹样进行融合");
alert("AI融合生成：\n"+sel.map(x=>x.name).join(" + "));
}

function downloadAll(){
if(sel.length===0)return alert("请先选择要下载的纹样");
sel.forEach(i=>window.open(i.img,"_blank"));
alert("已打开纹样大图 → 右键图片 → 另存为即可下载");
}
</script>
</body>
</html>
