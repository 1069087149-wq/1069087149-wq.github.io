    ];

    // 当前筛选列表和选中项
    let currentList = [...data];
    let selectedItems = [];

    // 填充下拉框
    function populateFilters() {
        const typeSelect = document.getElementById('type');
        const sourceSelect = document.getElementById('source');
        const uniqueTypes = [...new Set(data.map(d => d.type))].sort();
        const uniqueSources = [...new Set(data.map(d => d.source))].sort();
        typeSelect.innerHTML = '<option value="all">🎋 全部纹样类型</option>' + uniqueTypes.map(t => `<option value="${t}">${t}</option>`).join('');
        sourceSelect.innerHTML = '<option value="all">🏛️ 全部来源机构</option>' + uniqueSources.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    // 渲染网格
    function renderGrid(list) {
        const grid = document.getElementById('grid');
        if (list.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px; color:#666;">暂无匹配纹样</div>';
            return;
        }
        grid.innerHTML = list.map(item => {
            const isSelected = selectedItems.some(s => s.id === item.id);
            return `
            <div class="card ${isSelected ? 'selected' : ''}" onclick="toggleSelect(${item.id})">
                <div class="card-img">
                    <img src="${item.imgUrl}" alt="${item.name}" loading="lazy" onerror="this.onerror=null; this.src='${FALLBACK_IMAGE}'">
                </div>
                <div class="info">
                    <h4>${item.name}</h4>
                    <p><span class="badge">${item.type}</span> <span class="badge">${item.source}</span></p>
                    <p>寓意：${item.mean}</p>
                </div>
            </div>`;
        }).join('');
    }

    // 切换选中
    window.toggleSelect = function(id) {
        const item = data.find(d => d.id === id);
        if (!item) return;
        const idx = selectedItems.findIndex(s => s.id === id);
        idx === -1 ? selectedItems.push(item) : selectedItems.splice(idx, 1);
        updateSelectedBar();
        renderGrid(currentList);
    };

    function updateSelectedBar() {
        const bar = document.getElementById('selected');
        if (selectedItems.length === 0) bar.innerText = '已选纹样：无';
        else bar.innerText = '已选：' + selectedItems.map(s => s.name).join('、').substring(0,50) + (selectedItems.length > 5 ? '…' : '');
    }

    window.selectAllVisible = function() {
        currentList.forEach(item => {
            if (!selectedItems.some(s => s.id === item.id)) selectedItems.push(item);
        });
        updateSelectedBar();
        renderGrid(currentList);
    };

    window.clearSelection = function() {
        selectedItems = [];
        updateSelectedBar();
        renderGrid(currentList);
    };

    window.fusion = function() {
        if (selectedItems.length < 2) return alert('至少选择2个纹样进行AI融合');
        alert('AI融合生成：\n' + selectedItems.map(s => s.name).join(' + '));
    };

    window.downloadLinks = function() {
        if (selectedItems.length === 0) return alert('请先选择要下载的纹样');
        const links = selectedItems.map(item => item.imgUrl).join('\n');
        navigator.clipboard.writeText(links).then(() => {
            alert('已复制 ' + selectedItems.length + ' 个图片链接到剪贴板');
        }).catch(() => {
            alert('复制失败，可手动保存');
        });
    };

    window.applyFilter = function() {
        const searchTerm = document.getElementById('search').value.trim().toLowerCase();
        const typeVal = document.getElementById('type').value;
        const sourceVal = document.getElementById('source').value;
        currentList = data.filter(item => {
            if (typeVal !== 'all' && item.type !== typeVal) return false;
            if (sourceVal !== 'all' && item.source !== sourceVal) return false;
            if (searchTerm) {
                return item.name.toLowerCase().includes(searchTerm) ||
                       item.mean.toLowerCase().includes(searchTerm) ||
                       item.source.toLowerCase().includes(searchTerm);
            }
            return true;
        });
        renderGrid(currentList);
    };

    // 初始化
    populateFilters();
    renderGrid(data);
})();
</script>
